<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Smart To-Do Manager</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css">
<style>
    body { background-color: #f8f9fa; }
    .card.completed { text-decoration: line-through; color: #6c757d; }
    .card.red-border { border: 2px solid #dc3545 !important; }
</style>

</head>


<body>
    <div class="container py-5">
        <div class="row justify-content-center mb-4">
            <div class="col-md-8 text-center">
                <h1 class="mb-4">Smart To-Do Manager</h1>
                <div class="row g-2 align-items-end">
                    <div class="col-md-5">
                        <input type="text" id="taskName" class="form-control" placeholder="Task Name">
                    </div>
                    <div class="col-md-2">
                        <select id="priority" class="form-select">
                            <option value="Low">Low</option>
                            <option value="Medium">Medium</option>
                            <option value="High">High</option>
                        </select>
                    </div>
                    <div class="col-md-3">
                        <input type="date" id="deadline" class="form-control" >
                    </div>
                    <div class="col-md-2 d-grid">
                        <button id="addTaskBtn" class="btn btn-primary">Add Task</button>
                    </div>
                </div>
            </div>
        </div>
        <div class="row justify-content-center mb-3">
            <div class="col-md-8">
                <div class="d-flex flex-wrap gap-2 mb-2">
                    <button class="btn btn-outline-secondary filter-btn" id="allTasksBtn" data-filter="all">All</button>
                    <button class="btn btn-outline-success filter-btn" id="completedTasksBtn" data-filter="completed">Completed</button>
                    <button class="btn btn-outline-warning filter-btn" id="pendingTasksBtn" data-filter="pending">Pending</button>
                    <div class="ms-auto d-flex gap-2">
                        <select id="sortOption" class="form-select">
                            <option value="priority">Sort by Priority (High → Low)</option>
                            <option value="deadline">Sort by Deadline (Nearest first)</option>
                        </select>
                    </div>
                </div>
                <div class="mb-2">
                    <div class="row g-2 mb-2">
                        <div class="col-md-4">
                            <div class="card text-center shadow-sm">
                                <div class="card-body">
                                    <h6 class="card-title text-primary">Total Tasks</h6>
                                    <h3 id="totalTasks" class="card-text mb-0">0</h3>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card text-center shadow-sm">
                                <div class="card-body">
                                    <h6 class="card-title text-success">Completed</h6>
                                    <h3 id="completedTasks" class="card-text mb-0">0</h3>
                                </div>
                            </div>
                        </div>
                        <div class="col-md-4">
                            <div class="card text-center shadow-sm">
                                <div class="card-body">
                                    <h6 class="card-title text-warning">Pending</h6>
                                    <h3 id="pendingTasks" class="card-text mb-0">0</h3>
                                </div>
                            </div>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="row justify-content-center">
            <div class="col-md-8">
                <div id="taskList" class="d-flex flex-column gap-3">

                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
    </body>
    </html>
